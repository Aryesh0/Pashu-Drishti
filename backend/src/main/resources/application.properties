spring.application.name=Digital Farm Management Portal

# MongoDB Configuration
spring.data.mongodb.uri=mongodb://localhost:27017/farmportal?replicaSet=rs0&directConnection=true
spring.data.mongodb.database=farmportal

# Server Configuration
server.port=8080
server.servlet.context-path=/api/v1

# JWT Configuration
app.jwt.secret=DahdFarmPortalSecretKey2024VasudhaDigitalFarmManagementSecretKeyForJWT
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# Logging
logging.level.com.dahd.farmportal=DEBUG
logging.level.org.springframework.security=INFO

# Swagger / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.disable-swagger-default-url=true

# Pagination defaults
app.pagination.default-page-size=20
app.pagination.max-page-size=100
logging.level.org.springframework.web=DEBUG
